name: ci
on:
  pull_request:
  push:
    branches: [main]
jobs:
  guards:
    # REQUIRED check: the contract is intact and fully covered.
    # Set branch protection to require THIS job.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: spec lock (the contract is intact)
        run: python scripts/verify_spec_lock.py
      - name: regenerate features from the spec
        run: python scripts/extract_features.py
      - name: traceability (every rule covered, every TC implemented)
        run: python scripts/check_traceability.py
  suite:
    # REQUIRED as of v1.70 (construction complete; green is the expectation).
    # Operator: set branch protection to require THIS job alongside guards.
    runs-on: ubuntu-latest
    needs: guards
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: extract features
        run: python scripts/extract_features.py
      - name: install
        run: |
          pip install -r requirements-dev.txt
          if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi
      - name: NFR-07 wiring-audit gate (registry pytest — never the real-broker CLI)
        run: |
          if [ -f tests/bdd/test_tc_nfr_07_wiring_registry.py ]; then
            pytest tests/bdd/test_tc_nfr_07_wiring_registry.py -q
          else
            echo 'spec-only checkout: registry gate enforced wherever the live composition exists'
          fi
      - name: full suite
        run: pytest -q -m "not contract"
